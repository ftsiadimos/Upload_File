<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ code }} - {{ title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <header class="topbar">
    <span class="topbar-icon">&#9888;</span>
    <h1>{{ title }}</h1>
    <span class="topbar-version">Error {{ code }}</span>
  </header>

  <main class="error-page">
    <section class="error-card">
      <p class="error-code">{{ code }}</p>
      <h1>{{ title }}</h1>
      <p class="error-message">{{ message }}</p>
      <a class="btn btn-primary" href="{{ url_for('upload.index') }}">Return home</a>
    </section>
  </main>
</body>
</html>
